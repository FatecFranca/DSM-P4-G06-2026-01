version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agrotech_db
      POSTGRES_USER: agrotech
      POSTGRES_PASSWORD: agrotech
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agrotech']
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: agrotech123
      DOCKER_INFLUXDB_INIT_ORG: agrotech
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-super-secret-token
    ports:
      - '8086:8086'
    volumes:
      - influxdata:/var/lib/influxdb2

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  mosquitto:
   image: eclipse-mosquitto:2.0
   ports:
    - "1883:1883"
    - "9001:9001"
   volumes:
    - ./mosquitto:/mosquitto/config
   restart: unless-stopped

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_started
      redis:
        condition: service_started
      mosquitto:
        condition: service_started
    env_file: .env
    ports:
      - '3000:3000'
    volumes:
      - ./logs:/app/logs

volumes:
  pgdata:
  influxdata:
  redisdata:
  mosquittodata:
  mosquittologs:
